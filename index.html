<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/stl.css">
    <title>LoopTrainer</title>
</head>

<body>

    <div class="container">
        <div id="avatar" class="avatar"></div>

        <h1>LoopTrainer</h1>
        <p>Тренажер для вивчення циклів Python</p>

        <div class="login-box" id="authBlock">
            <input type="text" id="login" placeholder="Логін">
            <input type="password" id="password" placeholder="Пароль">

            <button onclick="loginUser()">Увійти</button>
            <button id="registerBtn" onclick="openRegister()">Реєстрація</button>
            <p class="forgot" onclick="openReset()">Забув пароль?</p>


            <p id="authResult"></p>
        </div>


        <div class="menu" id="mainMenu">
            <div class="menu-block">
                <button class="btn" onclick="toggleMenu('theoryMenu')">Теорія</button>
                <div class="submenu" id="theoryMenu">
                    <a href="pgs/theo/theory-for.html" class="sub-btn">Цикл For</a>
                    <a href="pgs/theo/theory-while.html" class="sub-btn">Цикл While</a>
                </div>
            </div>

            <div class="menu-block">
                <button class="btn" onclick="toggleMenu('visualMenu')">Візуалізація</button>
                <div class="submenu" id="visualMenu">
                    <a href="pgs/vis/visual-for.html" class="sub-btn">Цикл For</a>
                    <a href="pgs/vis/visual-while.html" class="sub-btn">Цикл While</a>
                </div>
            </div>

            <div class="menu-block">
                <button class="btn" onclick="toggleMenu('practiceMenu')">Практика</button>
                <div class="submenu" id="practiceMenu">
                    <a href="/pgs/pract/practice-for.html" class="sub-btn">Цикл For</a>
                    <a href="/pgs/pract/practice-while.html" class="sub-btn">Цикл While</a>
                </div>
            </div>
        </div>
    </div>
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRegister()">×</span>
            <h2>Реєстрація</h2>

            <input id="regLogin" placeholder="Логін">
            <input id="regPassword" type="password" placeholder="Пароль">

            <input id="regName" placeholder="Ім'я">
            <input id="regSurname" placeholder="Прізвище">
            <input id="regEmail" placeholder="Email">
            <input id="regPhone" placeholder="Телефон">
            <input id="regCity" placeholder="Місто">

            <button onclick="submitRegister()">Зберегти</button>

            <p id="regResult"></p>
        </div>
    </div>
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeReset()">×</span>
            <h2>Відновлення пароля</h2>

            <input id="resetLogin" placeholder="Логін">
            <input id="newPassword" type="password" placeholder="Новий пароль">

            <button onclick="resetPassword()">Змінити</button>

            <p id="resetResult"></p>
        </div>
    </div>
    <button id="logoutBtn" onclick="logoutUser()">Вийти</button>
    <script src="js/ind.js"></script>
</body>

</html>
